spring.application.name=viagens

# ─── Servidor ────────────────────────────────────────────────────────────────
server.port=8080

# ─── PostgreSQL ──────────────────────────────────────────────────────────────
# URL de conexão: protocolo://host:porta/nome_do_banco
spring.datasource.url=jdbc:postgresql://localhost:5432/viagens_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
# update: cria tabelas novas e atualiza existentes sem apagar dados
# Em produção usar: validate (só valida sem alterar)
spring.jpa.hibernate.ddl-auto=update

# Exibe as queries SQL geradas no console — útil para aprendizado e debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Chave secreta em hexadecimal para assinar tokens (256 bits mínimo para HS256)
# ATENÇÃO: em produção usar variável de ambiente, nunca expor no código!
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Tempo de expiração: 86400000ms = 24 horas
jwt.expiration=86400000

# ─── Jackson (serialização JSON) ─────────────────────────────────────────────
# Datas em formato legível (2025-12-20) em vez de timestamp numérico
spring.jackson.serialization.write-dates-as-timestamps=false